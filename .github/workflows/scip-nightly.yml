name: SCIP overlay (nightly)

# Runs the real-external-indexer integration tests that `ci.yml` deliberately
# skips on every push/PR (`#[ignore]`d — they need a heavy binary installed
# and are too slow/flaky to gate merges on). See the 8-language plan doc's
# P0.5: docs/superskills/plans/2026-07-07-eight-lang-formal-tier.md
on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC daily
  workflow_dispatch: {}

jobs:
  scip-overlay-nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rust-analyzer

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # `go` and `node`/`npm` are preinstalled on the `ubuntu-latest` runner
      # image (github.com/actions/runner-images) — no `actions/setup-*` step
      # needed for either, so nothing new to SHA-pin here. `scip-go` (P2.1)
      # is a real `go install`; `scip-python` (P2.4) and `scip-typescript`
      # (P3.2) run through `npx` on demand (see `runner.rs`'s
      # `python_resolve_binary`/`js_resolve_binary`) and need no separate
      # install step at all — only network access to the npm registry, which
      # this runner already has.
      - name: Install scip-go
        run: go install github.com/scip-code/scip-go/cmd/scip-go@latest

      # JDK 21 + Maven + Gradle are all preinstalled on the `ubuntu-latest`
      # runner image (github.com/actions/runner-images) — no `actions/setup-*`
      # step needed. `scip-java` (P2.2) has no standalone-binary release the
      # way `scip-go`/rust-analyzer do; its docs recommend `cs bootstrap`
      # (coursier) or the `sourcegraph/scip-java` Docker image, neither of
      # which is preinstalled here either. This step instead does what `cs
      # bootstrap` does under the hood — resolve the `com.sourcegraph:
      # scip-java_2.13` Maven Central artifact's full runtime classpath via
      # Maven (already on `PATH`, needs no `coursier` install of its own) and
      # wrap it in a launcher script — verified for real in the session that
      # added this step (see the 8-language plan's P2.2). Bump SCIP_JAVA_VERSION
      # when a newer release is verified the same way.
      - name: Install scip-java
        run: |
          set -euo pipefail
          SCIP_JAVA_VERSION=0.10.4
          BOOTSTRAP_DIR="$RUNNER_TEMP/scip-java-bootstrap"
          mkdir -p "$BOOTSTRAP_DIR"
          curl -sSfL -o "$BOOTSTRAP_DIR/scip-java.jar" \
            "https://repo1.maven.org/maven2/com/sourcegraph/scip-java_2.13/${SCIP_JAVA_VERSION}/scip-java_2.13-${SCIP_JAVA_VERSION}.jar"
          cat > "$BOOTSTRAP_DIR/pom.xml" <<EOF
          <project xmlns="http://maven.apache.org/POM/4.0.0">
            <modelVersion>4.0.0</modelVersion>
            <groupId>local</groupId>
            <artifactId>scip-java-bootstrap</artifactId>
            <version>1.0</version>
            <dependencies>
              <dependency>
                <groupId>com.sourcegraph</groupId>
                <artifactId>scip-java_2.13</artifactId>
                <version>${SCIP_JAVA_VERSION}</version>
              </dependency>
            </dependencies>
          </project>
          EOF
          mvn -q -B -f "$BOOTSTRAP_DIR/pom.xml" dependency:build-classpath \
            -Dmdep.outputFile="$BOOTSTRAP_DIR/cp.txt"
          mkdir -p "$HOME/.local/bin"
          cat > "$HOME/.local/bin/scip-java" <<EOF
          #!/usr/bin/env bash
          exec java -cp "$BOOTSTRAP_DIR/scip-java.jar:\$(cat "$BOOTSTRAP_DIR/cp.txt")" \
            com.sourcegraph.scip_java.ScipJava "\$@"
          EOF
          chmod +x "$HOME/.local/bin/scip-java"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # .NET SDK is preinstalled on the `ubuntu-latest` runner image
      # (github.com/actions/runner-images ships several SDK versions) — no
      # separate `actions/setup-dotnet` step needed, matching the JDK/Go/Node
      # comment above. `scip-dotnet` (P2.3) is a real NuGet-published
      # `dotnet tool`, confirmed by installing and running it for real in the
      # session that added this step (see the 8-language plan's P2.3) — no
      # bespoke Maven-style bootstrap needed the way `scip-java` above is.
      - name: Install scip-dotnet
        run: |
          set -euo pipefail
          dotnet tool install --global scip-dotnet
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      # PHP + Composer are preinstalled on the `ubuntu-latest` runner image.
      # `scip-php` (P2.5) is a real Packagist package (`davidrjenni/scip-php`)
      # confirmed by actually installing and running it for real in the
      # session that added this step (see the 8-language plan's P2.5).
      # Installed as a Composer *global* dependency (distinct from a
      # project-local `vendor/bin/scip-php`, which `php_resolve_binary` tries
      # first) so it's on `PATH` for whichever fixture the ignored tests
      # point at.
      - name: Install scip-php
        run: |
          set -euo pipefail
          composer global require davidrjenni/scip-php
          echo "$(composer global config bin-dir --absolute)" >> "$GITHUB_PATH"

      # scip-clang (P3.1) is deliberately NOT installed here. This session's
      # own sandbox could not obtain a real `scip-clang` binary at all —
      # prebuilt binaries are published as GitHub Release assets, and this
      # environment's egress policy returns a hard 403 for both
      # `api.github.com` and `github.com/*/releases/*` (confirmed via the
      # proxy's own status endpoint, a real policy denial, not a transient
      # failure); building from source needs Bazel, not available here
      # either. `provider::CLANG` (`crates/calm-core/src/scip/provider.rs`)
      # is therefore scaffolding validated by unit tests only — there is no
      # `#[ignore]`d live-binary integration test for this provider the way
      # every other one above has, so installing a binary here wouldn't add
      # any real coverage yet regardless. A genuine GitHub Actions runner has
      # unrestricted internet access and could plausibly `curl` a release
      # asset from https://github.com/sourcegraph/scip-clang/releases
      # directly, but writing that step blind — never having verified the
      # download URL, that the binary actually runs, or that a real
      # `compile_commands.json` fixture resolves through it — would be
      # untested CI surface pretending to be tested. Add this step for real,
      # alongside the matching `#[ignore]`d test, once a future session can
      # verify the whole path end to end the way every step above was
      # earned.
      - name: Run real-indexer integration tests
        run: cargo test --workspace -- --ignored
